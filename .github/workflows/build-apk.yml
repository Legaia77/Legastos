name: Build APK

on:
  push:
    branches:
      - claude/android-finance-app-fZpDi
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build extern debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build extern debug APK
        run: ./gradlew :myExpenses:assembleExternDebug --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find . -path ./artifacts -prune -o -type f -name '*.apk' -print | while read f; do
            cp "$f" artifacts/
          done
          ls -la artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: myExpenses-extern-debug
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30
